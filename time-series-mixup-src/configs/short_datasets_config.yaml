models:
  - name: "InceptionTime"
    enabled: true
    config:
      nb_filters: 32
      depth: 6
      kernel_size: 41
      use_residual: true
      use_bottleneck: true
  
  - name: "SimpleRNN"
    enabled: true
    config:
      hidden_size: 256
      num_layers: 3
  
  - name: "SimpleMHSA"
    enabled: true
    config:
      d_model: 512
      num_heads: 8
      dff: 512

augmentations:
  - name: "standard_mixup"
    enabled: true
    strategies: ["random", "intra", "inter"]
    config:
      alpha: 1.0
      do_prob: 0.5
  
  - name: "adaptive_mixup"
    enabled: true
    strategies: ["adaptive"]
    config:
      alpha: 1.0
      do_prob: 0.5
      minority_threshold: 0.3
      similarity_threshold: 0.7
  
  - name: "window_warp"
    enabled: true
    config:
      min_window_size_ratio: 0.125
      max_window_size_ratio: 0.333
      scale_factor: 2.0
      do_prob: 0.5
  
  - name: "cutout"
    enabled: true
    config:
      min_cutout_len_ratio: 0.25
      max_cutout_len_ratio: 0.5
      channel_drop_prob: 0.3
      do_prob: 0.5
  
  - name: "cutmix"
    enabled: true
    config:
      min_cutmix_len_ratio: 0.25
      max_cutmix_len_ratio: 0.5
      channel_replace_prob: 0.3
      do_prob: 0.5