# 基础配置文件
hyperparameters:
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 1e-4
  training_epochs: 100
  early_stopping_patience: 10
  gradient_clip: 1.0
  
model:
  dropout: 0.1
  
augment:
  do_prob: 0.5
  
loss:
  type: "focal"  # cross_entropy, focal, adaptive_focal
  focal_gamma: 2.0
  focal_alpha: null
  
environment:
  device: "cuda"
  num_workers: 2
  pin_memory: true
  mixed_precision: true  # 使用混合精度训练